{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-success text-white">
                <h3>Add Doctor</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-success">
                        Save Doctor
                    </button>
                    <a href="{% url 'doctor_list' %}" class="btn btn-secondary">
                        Back
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

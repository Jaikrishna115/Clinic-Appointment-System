{% extends 'base.html' %}
{% block title %}
404 - Page Not Found
{% endblock %}
{% block content %}
<div class="text-center mt-5">
    <h1 class="display-1 text-danger">
        404
    </h1>
    <h3>
        Oops! Page Not Found
    </h3>
    <p class="text-muted">
        The page you are looking for doesn't exist.
    </p>
    <a href="{% url 'home' %}" class="btn btn-primary">
        Go Back Home
    </a>
</div>
{% endblock %}
